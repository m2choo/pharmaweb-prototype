<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웰체크 약사웹 — CL note 복약 상담</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#F4F5F7;min-height:100vh;display:flex;}

/* ── LNB ── */
.lnb{width:200px;min-height:100vh;background:#fff;border-right:1px solid #E8EAED;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:10;}
.lnb-logo{padding:20px 20px 16px;border-bottom:1px solid #E8EAED;}
.lnb-logo svg{width:100px;}
.lnb-nav{padding:8px 0;flex:1;}
.lnb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:#555;cursor:pointer;position:relative;text-decoration:none;transition:background .1s;}
.lnb-item:hover{background:#F4F5F7;}
.lnb-item.active{background:#2563EB;color:#fff;font-weight:600;border-radius:6px;margin:0 8px;padding:10px 12px;}
.lnb-item.active svg path,.lnb-item.active svg circle,.lnb-item.active svg rect{stroke:#fff;}
.lnb-icon{width:16px;height:16px;flex-shrink:0;opacity:.6;}
.lnb-item.active .lnb-icon{opacity:1;}
.lnb-badge{margin-left:auto;background:#EF4444;color:#fff;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.lnb-bottom{border-top:1px solid #E8EAED;padding:12px 16px;margin-top:auto;}
.lnb-user{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.lnb-avatar{width:32px;height:32px;border-radius:50%;background:#EBF2FF;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#2563EB;flex-shrink:0;}
.lnb-username{font-size:12px;font-weight:600;color:#111;}
.lnb-pharmacy{font-size:11px;color:#888;}
.lnb-btns{display:flex;gap:6px;}
.lnb-btn-sm{flex:1;padding:6px;font-size:11px;color:#555;border:1px solid #E0E0E0;border-radius:6px;background:#fff;cursor:pointer;font-family:inherit;text-align:center;}

/* ── MAIN ── */
.main{margin-left:200px;flex:1;min-height:100vh;display:flex;flex-direction:column;}

/* page header */
.page-hd{padding:20px 32px 12px;background:#fff;border-bottom:1px solid #E8EAED;}
.page-title{font-size:20px;font-weight:700;color:#111;}
.page-sub{font-size:12px;color:#888;margin-top:4px;}

/* content */
.content{flex:1;padding:20px 32px;display:flex;flex-direction:column;gap:16px;}

/* 필터 탭 */
.filter-tabs{display:flex;flex-wrap:wrap;gap:8px;}
.filter-tab{height:36px;padding:0 16px;border-radius:20px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid #D9DEE8;background:#fff;color:#333D48;transition:border-color .12s,background .12s;}
.filter-tab:hover{border-color:#AEB7C6;}
.filter-tab.active{border-color:#2563EB;background:#F2F6FF;color:#2563EB;font-weight:700;}

.content-card{background:#fff;border-radius:8px;border:1px solid #E8EAED;display:flex;flex-direction:column;flex:1;overflow:hidden;}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;}
.total-count{font-size:14px;font-weight:600;color:#111;}
.total-count-value{color:#2563EB;}
.search-wrap{position:relative;}
.search-input{width:260px;height:36px;padding:0 34px 0 12px;font-size:13px;font-family:inherit;border:1px solid #E0E0E0;border-radius:6px;outline:none;}
.search-input:focus{border-color:#2563EB;}
.search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none;}

/* table */
table{width:100%;border-collapse:collapse;}
thead tr{background:#F8F9FA;border-bottom:1px solid #E8EAED;}
th{padding:10px 14px;font-size:11.5px;font-weight:600;color:#888;text-align:center;white-space:nowrap;}
tbody tr{border-bottom:1px solid #F2F4F6;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#F8FBFF;}
td{padding:13px 14px;font-size:12.5px;color:#333;text-align:center;vertical-align:middle;}
.td-date{color:#666;font-size:12px;white-space:nowrap;}
.td-name{font-weight:600;color:#111;white-space:nowrap;}
.td-phone{color:#555;white-space:nowrap;}

/* 발송 현황 칩 */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.chip-draft{background:#F0F0F0;color:#666;border:1px solid #E0E0E0;}
.chip-sent{background:#EEFAF0;color:#00A82D;border:1px solid #CFF4CE;}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}

.badge-regular-txt{color:#2563EB;font-weight:600;}
.badge-new-txt{color:#888;}

/* 관리 버튼 */
.mgmt-link{background:none;border:none;font-family:inherit;font-size:12.5px;font-weight:600;color:#2563EB;cursor:pointer;padding:4px 8px;border-radius:6px;white-space:nowrap;}
.mgmt-link:hover{background:#F0F6FF;text-decoration:underline;}
.mgmt-link.view{color:#666;}
.mgmt-link.view:hover{background:#F4F5F7;}

/* 빈 상태 */
.empty-wrap{padding:80px 20px;text-align:center;color:#AAA;}
.empty-title{font-size:14px;font-weight:600;color:#888;margin-bottom:6px;}
.empty-sub{font-size:12.5px;color:#AAA;line-height:1.7;}

/* 메시지 미리보기 레이어 */
.view-layer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.view-layer.on{display:flex;}
.view-box{width:700px;max-width:92vw;max-height:86vh;background:#fff;border-radius:14px;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.28);}
.view-hd{display:flex;align-items:center;justify-content:space-between;padding:22px 28px 18px;border-bottom:1px solid #E8EAED;}
.view-title{font-size:18px;font-weight:700;color:#111;}
.view-x{width:28px;height:28px;background:none;border:none;cursor:pointer;color:#888;font-size:18px;border-radius:6px;font-family:inherit;}
.view-x:hover{background:#F4F5F7;}
.view-cols{display:grid;grid-template-columns:1fr 1.35fr;gap:28px;padding:22px 28px;overflow-y:auto;}
.view-col-title{font-size:14px;font-weight:700;color:#111;margin-bottom:12px;}
.view-info-table{width:100%;border-collapse:collapse;}
.view-info-table th{width:76px;text-align:left;font-size:12.5px;font-weight:600;color:#888;padding:10px 8px 10px 0;vertical-align:top;white-space:nowrap;}
.view-info-table td{font-size:13.5px;color:#111;padding:10px 0;font-weight:500;}
.view-msg-box{width:100%;background:#F8F9FA;border:1px solid #E8EAED;border-radius:10px;padding:16px;font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;height:44vh;overflow-y:auto;font-family:inherit;resize:none;}
.view-msg-box[readonly]{background:#F8F9FA;}
.view-msg-box:not([readonly]){background:#fff;border-color:#AEB7C6;}
.view-msg-box:not([readonly]):focus{outline:none;border-color:#2563EB;}
.view-ft{padding:18px 28px 24px;display:flex;justify-content:center;gap:10px;}
.view-confirm-btn{width:100%;max-width:320px;height:44px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.view-confirm-btn:hover{background:#1d4fd1;}
.view-draft-btn{flex:1;max-width:200px;height:44px;background:#fff;color:#2563EB;border:1px solid #A0B4FF;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.view-draft-btn:hover{background:#F2F6FF;}
.view-send-btn{flex:1;max-width:200px;height:44px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.view-send-btn:hover{background:#1d4fd1;}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(16px);background:#1E293B;color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;transition:opacity .22s,transform .22s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LNB -->
<nav class="lnb">
  <div class="lnb-logo">
    <svg viewBox="0 0 120 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="22" font-family="'Noto Sans KR', sans-serif" font-size="20" font-weight="700" fill="#2563EB">Wellcheck</text>
    </svg>
  </div>
  <div class="lnb-nav">
    <a class="lnb-item" href="customer_list_v2.html" style="text-decoration:none;color:inherit;">

    </div>

      <button class="lnb-btn-sm">로그아웃</button>

</nav>

<!-- MAIN -->
<main class="main">
  <div class="page-hd">
    <div class="page-title">CL note 복약 상담</div>
    <div class="page-sub">임시저장하거나 발송한 AI 복약 상담 메시지를 모아 확인·이어작성할 수 있습니다.</div>
  </div>

  <div class="content">
    <div class="filter-tabs" id="filterTabs"></div>

    <div class="content-card">
      <div class="toolbar">
        <div class="total-count">총 상담 건수 <span class="total-count-value" id="totalCount">(0)</span></div>
        <div class="search-wrap">
          <input class="search-input" id="searchInput" type="search" placeholder="고객명 또는 휴대전화 번호 검색" oninput="renderTable()" autocomplete="off">
          <span class="search-icon">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path d="m17.82 16.95-3.847-3.847a6.77 6.77 0 1 0-.87.87l3.847 3.847a.616.616 0 1 0 .87-.87M3.246 8.779A5.532 5.532 0 1 1 8.78 14.31 5.54 5.54 0 0 1 3.246 8.78"></path></svg>
          </span>
        </div>
      </div>

</main>

<!-- 발송완료 메시지 보기 레이어 -->
<div class="view-layer" id="viewLayer">
  <div class="view-box">
    <div class="view-hd">
      <div class="view-title" id="viewTitle">복약 상담 상세</div>
      <button class="view-x" onclick="closeView()">✕</button>

    <div class="view-cols">

        <div class="view-col-title">고객 정보</div>

<div class="toast" id="toast"></div>

<script>
const CL_NOTES_KEY = 'wcCLNotes';
function loadNotes() {
  try { return JSON.parse(localStorage.getItem(CL_NOTES_KEY) || '[]'); } catch (e) { return []; }
}

const JOIN_NOTE = '\n\n[웰체크 앱 가입 안내]\n아래 링크에서 웰체크 앱에 가입하시면 저희 약국이 단골 약국으로 자동 연결됩니다.\nhttps://wellcheck.co.kr/join?ref=pharmacy';

function seedDummyNotes() {
  const notes = loadNotes().filter(n => !(n.id || '').startsWith('seed_'));
  const dummies = [
    {
      id: 'seed_1', name: '이체크', phone: '010-2233-4455', birth: '1978-05-12', gender: '여성', age: 48, isNew: false, status: '임시저장',
      message: '[약사 상담 메모]\n혈압약 복용 시간이 불규칙하다고 하셔서 아침 식후 고정 복용을 권장드렸습니다. 다음 방문 시 혈압 수치 확인 예정입니다.',
      createdAt: '2026-07-01 14:20', updatedAt: '2026-07-01 14:30'
    },
    {
      id: 'seed_2', name: '김체크', phone: '010-1234-5678', birth: '1990-11-02', gender: '남성', age: 36, isNew: true, status: '발송완료',
      message: '[약사 상담 메모]\n오늘 처방받으신 약은 하루 3회 식후 30분에 복용해 주세요. 졸음을 유발할 수 있어 운전이나 기계 조작 시 주의가 필요합니다.' + JOIN_NOTE,
      createdAt: '2026-07-01 09:00', updatedAt: '2026-07-01 09:15'
    },
    {
      id: 'seed_3', name: '이웰빙', phone: '010-3344-5566', birth: '1965-02-20', gender: '여성', age: 61, isNew: false, status: '발송완료',
      message: '[약사 상담 메모]\n항생제는 증상이 호전되어도 처방된 기간 동안 끝까지 복용하셔야 내성이 생기지 않습니다. 유산균은 항생제와 2시간 간격을 두고 드세요.',
      createdAt: '2026-06-30 10:50', updatedAt: '2026-06-30 11:00'
    },
    {
      id: 'seed_4', name: '김네모', phone: '010-4455-6677', birth: '1955-08-09', gender: '남성', age: 71, isNew: false, status: '발송완료',
      message: '[약사 상담 메모]\n당뇨약과 함께 처방된 위장약은 공복에 드시면 속쓰림이 완화됩니다. 저혈당 증상(어지러움, 식은땀) 발생 시 바로 당분을 섭취하시고 병원에 문의해 주세요.',
      createdAt: '2026-06-29 16:30', updatedAt: '2026-06-29 16:45'
    },
    {
      id: 'seed_5', name: '최세모', phone: '010-5566-7788', birth: '2001-09-30', gender: '여성', age: 25, isNew: true, status: '임시저장',
      message: '[약사 상담 메모]\n감기약 처방분에 진해거담제가 포함되어 있어 물을 충분히 드시는 것이 좋습니다.' + JOIN_NOTE,
      createdAt: '2026-06-28 10:10', updatedAt: '2026-06-28 10:20'
    }
  ];
  saveNotes(notes.concat(dummies));
}
function saveNotes(list) {
  localStorage.setItem(CL_NOTES_KEY, JSON.stringify(list));
}
seedDummyNotes();

const FILTERS = [
  { key: 'all', label: '전체' },
  { key: '임시저장', label: '임시저장' },
  { key: '발송완료', label: '발송완료' },
];
let activeFilter = 'all';

function renderFilterTabs() {
  const notes = loadNotes();
  document.getElementById('filterTabs').innerHTML = FILTERS.map(f => {
    const count = f.key === 'all' ? notes.length : notes.filter(n => n.status === f.key).length;
    return `<button class="filter-tab${activeFilter === f.key ? ' active' : ''}" onclick="setFilter('${f.key}')">${f.label} (${count})</button>`;
  }).join('');
}

function setFilter(key) {
  activeFilter = key;
  renderFilterTabs();
  renderTable();
}

function renderTable() {
  const q = (document.getElementById('searchInput').value || '').trim();
  let notes = loadNotes().sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));

  if (activeFilter !== 'all') notes = notes.filter(n => n.status === activeFilter);
  if (q) notes = notes.filter(n => (n.name || '').includes(q) || (n.phone || '').includes(q));

  document.getElementById('totalCount').textContent = '(' + notes.length + ')';

  const wrap = document.getElementById('tableWrap');
  if (!notes.length) {
    wrap.innerHTML = `
      <div class="empty-wrap">
        <div class="empty-title">저장된 복약 상담 기록이 없습니다</div>
        <div class="empty-sub">AI 복약 상담 메시지 작성 중 '임시저장'을 누르거나,<br>전송을 완료하면 이곳에 기록이 표시됩니다.</div>
      </div>`;
    return;
  }

  wrap.innerHTML = `
    <table>
      <colgroup><col style="width:16%"><col style="width:14%"><col style="width:16%"><col style="width:14%"><col style="width:14%"><col style="width:12%"></colgroup>
      <thead>
        <tr>
          <th>작성일시</th>
          <th>고객명</th>
          <th>휴대전화 번호</th>
          <th>발송 현황</th>
          <th>단골 등록여부</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody>
        ${notes.map(n => rowHTML(n)).join('')}
      </tbody>
    </table>
  `;
}

function rowHTML(n) {
  const chip = n.status === '발송완료'
    ? '<span class="chip chip-sent"><span class="chip-dot"></span>발송완료</span>'
    : '<span class="chip chip-draft"><span class="chip-dot"></span>임시저장</span>';
  const regular = n.isNew
    ? '<span class="badge-new-txt">신규</span>'
    : '<span class="badge-regular-txt">단골</span>';
  const action = n.status === '발송완료'
    ? `<button class="mgmt-link view" onclick="openView('${n.id}')">내용 보기</button>`
    : `<button class="mgmt-link" onclick="goResume('${n.id}')">이어서 작성</button>`;
  return `
    <tr>
      <td class="td-date">${n.updatedAt || '—'}</td>
      <td class="td-name">${n.name || '—'}</td>
      <td class="td-phone">${n.phone || '—'}</td>
      <td>${chip}</td>
      <td>${regular}</td>
      <td>${action}</td>
    </tr>
  `;
}

let currentModalId = null;
let currentModalMode = 'view';

function nowStr() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}

function fillModalInfo(rec) {
  document.getElementById('viewName').textContent = rec.name || '—';
  document.getElementById('viewBirth').textContent = rec.birth || '—';
  document.getElementById('viewAge').textContent = rec.age ? (rec.age + '세') : '—';
  document.getElementById('viewGender').textContent = rec.gender || '—';
  document.getElementById('viewPhone').textContent = rec.phone || '—';
  document.getElementById('viewRegular').textContent = rec.isNew ? '신규' : '단골';
  document.getElementById('viewBody').value = rec.message || '';
}

function openView(id) {
  const rec = loadNotes().find(n => n.id === id);
  if (!rec) return;
  currentModalId = id;
  currentModalMode = 'view';
  document.getElementById('viewTitle').textContent = '복약 상담 상세';
  fillModalInfo(rec);
  document.getElementById('viewBody').readOnly = true;
  document.getElementById('viewFt').innerHTML = '<button class="view-confirm-btn" onclick="closeView()">확인</button>';
  document.getElementById('viewLayer').classList.add('on');
}

function goResume(id) {
  const rec = loadNotes().find(n => n.id === id);
  if (!rec) return;
  currentModalId = id;
  currentModalMode = 'resume';
  document.getElementById('viewTitle').textContent = '복약 상담 이어서 작성';
  fillModalInfo(rec);
  document.getElementById('viewBody').readOnly = false;
  document.getElementById('viewFt').innerHTML = `
    <button class="view-draft-btn" onclick="saveResumeDraft()">임시저장</button>
    <button class="view-send-btn" onclick="sendResumeFinal()">➤ 전송하기</button>
  `;
  document.getElementById('viewLayer').classList.add('on');
}

function updateModalRecord(status) {
  const notes = loadNotes();
  const idx = notes.findIndex(n => n.id === currentModalId);
  if (idx === -1) return;
  notes[idx] = Object.assign({}, notes[idx], {
    message: document.getElementById('viewBody').value,
    status,
    updatedAt: nowStr()
  });
  saveNotes(notes);
}

function saveResumeDraft() {
  updateModalRecord('임시저장');
  closeView();
  renderFilterTabs();
  renderTable();
  showToast('복약지도가 임시저장되었습니다.');
}

function sendResumeFinal() {
  updateModalRecord('발송완료');
  closeView();
  renderFilterTabs();
  renderTable();
  showToast('복약지도가 발송되었습니다.');
}

function closeView() {
  document.getElementById('viewLayer').classList.remove('on');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

renderFilterTabs();
renderTable();
</script>
</body>
</html>
