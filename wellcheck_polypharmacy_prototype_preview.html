/* 1차 탭 전용 스타일 */
.radio-group{display:flex;flex-direction:column;gap:6px}.radio-group label{display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;padding:5px 8px;border-radius:6px;border:1px solid #e5e7eb}.radio-group label:has(input:checked){border-color:#3f6ff2;background:#eaf0ff;color:#3f6ff2;font-weight:800}.radio-group input[type=radio]{accent-color:#3f6ff2}
.method-group{display:flex;gap:6px;margin-top:6px}.method-btn{flex:1;height:32px;border:1px solid #d7dce4;border-radius:7px;background:#fff;font-size:12px;font-weight:800;color:#667085;cursor:pointer}.method-btn.sel{border-color:#3f6ff2;background:#eaf0ff;color:#3f6ff2}
.field-label{font-size:12px;font-weight:800;color:#374151;margin:0 0 6px}.field-input{width:100%;height:36px;border:1px solid #d7dce4;border-radius:7px;padding:0 10px;font-size:13px}.field-textarea{width:100%;border:1px solid #d7dce4;border-radius:7px;padding:10px;font-size:13px;resize:vertical;line-height:1.6;font-family:inherit}.field-textarea:focus,.field-input:focus{outline:none;border-color:#3f6ff2}

.adh-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px}.adh-bar-bg{flex:1;height:10px;background:#eef1f5;border-radius:99px;overflow:hidden}.adh-bar-fill{height:100%;border-radius:99px;background:#3f6ff2}.adh-label{font-size:12px;font-weight:800;min-width:28px;text-align:right}

.guide-box{border:1px solid #d7dce4;border-radius:8px;background:#fafafa;padding:12px;font-size:13px;line-height:1.8;white-space:pre-line;min-height:100px}.guide-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}.guide-btn{height:32px;padding:0 12px;border:1px solid #d7dce4;border-radius:7px;background:#fff;font-size:12px;font-weight:800;color:#374151;cursor:pointer}.guide-btn:hover{border-color:#3f6ff2;color:#3f6ff2}.guide-btn.primary{background:#3f6ff2;color:#fff;border-color:#3f6ff2}.guide-btn.primary:hover{background:#2f5dd4}.guide-btn:disabled{color:#9ca3af;background:#f3f4f6;border-color:#e5e7eb;cursor:not-allowed}.guide-btn:disabled:hover{border-color:#e5e7eb;color:#9ca3af}
.submit-box{border:2px solid #3f6ff2;border-radius:10px;background:#f0f5ff;padding:18px}.submit-box.done{border-color:#009c3b;background:#f0fdf4}.submit-title{font-size:14px;font-weight:900;color:#1e40af;margin-bottom:6px}.submit-box.done .submit-title{color:#009c3b}.submit-desc{font-size:12px;color:#6b7280;margin-bottom:14px}.submit-btn{height:42px;border:0;border-radius:8px;background:#3f6ff2;color:#fff;font-size:14px;font-weight:900;cursor:pointer;padding:0 24px}.submit-btn:disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}

.quick-modal{width:480px;background:#fff;border:1px solid #d7dce4;border-radius:14px;padding:24px;box-shadow:0 24px 70px rgba(15,23,42,.24);position:relative}.quick-template-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}.quick-tpl{height:30px;padding:0 12px;border:1px solid #d7dce4;border-radius:7px;background:#fff;font-size:12px;font-weight:800;color:#374151;cursor:pointer}.quick-tpl:hover,.quick-tpl.sel{border-color:#3f6ff2;background:#eaf0ff;color:#3f6ff2}
.consult-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.consult-field{display:flex;flex-direction:column;gap:4px}.check-group{display:flex;flex-wrap:wrap;gap:6px}.check-item{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}.check-item input{accent-color:#3f6ff2}
.section-divider{height:1px;background:#eef1f5;margin:16px 0}
.adh-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.adh-card{border:1px solid #e5e7eb;border-radius:10px;background:#fff;padding:14px}.adh-card-title{font-size:13px;font-weight:900;color:#202733;margin-bottom:6px}.adh-card-hint{display:flex;align-items:flex-start;gap:5px;margin-bottom:4px}.adh-hint-icon{display:inline-flex;width:14px;height:14px;border-radius:50%;background:#d1d5db;color:#6b7280;font-size:9px;font-weight:900;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.adh-hint-text{font-size:11px;color:#9ca3af;line-height:1.5}

.content{min-width:0}

/* ── 단계별 흐름 레이아웃 ── */
.phase-block{border:1.5px solid #e5e9f0;border-radius:14px;overflow:hidden;background:#fff;margin-bottom:8px}
.phase-block.collapsed .phase-body{display:none}
.phase-toggle{font-size:12px;color:#9ca3af;margin-left:8px;transition:transform 0.2s;display:inline-block}
.phase-block:not(.collapsed) .phase-toggle{transform:rotate(180deg)}
.action-now{border:1.5px solid #3f6ff2;border-radius:14px;background:#fff;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.action-now-l{display:flex;flex-direction:column;gap:3px}
.action-now-tag{font-size:11px;font-weight:700;color:#9ca3af}
.action-now-title{font-size:15px;font-weight:800;color:#111827}
.action-now-desc{font-size:12px;color:#6b7280}
.phase-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#f7f8fa;border-bottom:1px solid #e5e9f0}
.phase-header-l{display:flex;align-items:center;gap:12px}
.phase-num{width:30px;height:30px;border-radius:50%;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.phase-num-active{background:#3f6ff2;color:#fff}
.phase-num-done{background:#16a34a;color:#fff}
.phase-num-idle{background:#e5e7eb;color:#9ca3af}
.phase-title{font-size:15px;font-weight:800;color:#111827;line-height:1.3}
.phase-sub{font-size:11px;color:#6b7280;margin-top:2px}
.phase-badge{display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:99px;font-size:11px;font-weight:800}
.phase-badge-active{background:#eaf0ff;color:#3f6ff2}
.phase-badge-done{background:#dcfce7;color:#16a34a}
.phase-badge-idle{background:#f3f4f6;color:#9ca3af}
.phase-body{padding:16px 20px;display:flex;flex-direction:column;gap:0}
.phase-connector{display:flex;justify-content:center;padding:4px 0}
.phase-connector::before{content:'';display:block;width:2px;height:24px;background:#d1d5db;border-radius:2px}
</style>

<body>
<div class="app">
  <aside class="sidebar">
    <div>
      <div class="logo"><img src="BI.svg" alt="Wellcheck" style="width:140px;height:auto"></div>
      <nav class="nav"><button class="active" data-page="customers">♙ 단골 고객</button><button data-message="처방전 메뉴는 다음 단계에서 연결합니다.">▣ 처방전</button><button data-message="앱 설치 문자 발송 메뉴는 다음 단계에서 연결합니다.">✉ 앱 설치 문자 발송</button></nav>
      <div class="side-divider"></div><div class="side-links"><div class="side-link">약국설정</div><div class="side-link">1:1 채팅문의</div><div class="side-link">원격 지원 요청하기 ›</div></div>
    </div>
    <div class="profile"><div class="profile-row"><div class="avatar"></div><div><strong>김체크 약사</strong><span>하나누리 약국</span></div></div><div class="profile-actions"><button class="outline-btn">내정보</button><button class="outline-btn">로그아웃</button></div></div>
  </aside>
  <main class="content"><header class="header"><div><h1 id="pageTitle"></h1><div id="pageSubtitle" class="subtitle"></div></div><div id="headerAction" class="header-action"></div></header><section id="mainArea" class="main"></section></main>
</div>
<div id="toast" class="toast"></div>

<!-- 대상자 초대 모달 -->
<div id="inviteModal" class="modal-backdrop" aria-hidden="true"><div class="invite-modal"><button id="inviteClose" class="modal-close">×</button><h2 class="invite-title">대상자 초대</h2><p class="invite-desc">환자에게 다제약물 관리사업 초대 문자를 발송합니다.</p><label class="invite-label">환자 이름</label><input id="inviteName" class="invite-input" value="홍길동"><label class="invite-label">연락처</label><input id="invitePhone" class="invite-input" value="010-0000-0000"><div class="invite-label">발송 메시지 미리보기</div><div id="invitePreview" class="invite-preview"></div><button id="inviteSend" class="invite-submit">문자 발송</button></div></div>

<!-- 상담지 미확정 확인 팝업 -->
<div id="consultConfirmModal" class="modal-backdrop" aria-hidden="true" style="align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.18);padding:28px 24px 20px">
    <div style="font-size:14px;font-weight:600;color:#111827;line-height:1.7;text-align:center;margin-bottom:24px">상담지 최종 확정 전입니다.<br>상담지를 확인하시겠습니까?</div>
    <div style="display:flex;gap:10px">
      <button id="consultConfirmCancel" style="flex:1;padding:10px 0;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:14px;font-weight:600;color:#374151;cursor:pointer">취소</button>
      <button id="consultConfirmOk" style="flex:1;padding:10px 0;border:none;border-radius:8px;background:#2563eb;font-size:14px;font-weight:600;color:#fff;cursor:pointer">확인</button>
    </div>
  </div>
</div>

<!-- 상담지 팝업 모달 -->
<div id="consultPopupModal" class="modal-backdrop" aria-hidden="true" style="align-items:stretch;padding:0">
  <div style="display:flex;flex-direction:column;width:100%;max-width:900px;height:100vh;margin:0 auto;background:#fff">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #e5e7eb;background:#fff;flex-shrink:0">
      <div style="font-size:15px;font-weight:800;color:#111827" id="consultPopupTitle">1차 디지털 상담지</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="consultPopupPrintBtn" style="height:36px;padding:0 14px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#374151;cursor:pointer">🖨 인쇄</button>
        <button id="consultPopupPdfBtn" style="height:36px;padding:0 14px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#374151;cursor:pointer">⬇ PDF 저장</button>
        <button id="consultPopupCloseBtn" style="height:36px;width:36px;border:none;border-radius:8px;background:#f3f4f6;font-size:18px;font-weight:700;color:#6b7280;cursor:pointer;line-height:1">×</button>
      </div>
    </div>
    <div style="flex:1;overflow:auto">
      <iframe id="consultPopupIframe" src="dashboard_v2.html" style="width:100%;min-height:600px;border:none;display:block"></iframe>
    </div>
  </div>
</div>

<!-- 확정 전 인쇄/PDF 안내 모달 -->
<div id="prefinalizeModal" class="modal-backdrop" aria-hidden="true">
  <div style="width:340px;background:#fff;border-radius:12px;padding:28px 24px;box-shadow:0 24px 70px rgba(15,23,42,.24)">
    <p id="prefinalizeModalMsg" style="font-size:14px;color:#374151;text-align:center;margin:0 0 24px;line-height:1.7"></p>
    <div style="display:flex;gap:8px">
      <button id="prefinalizeCancelBtn" style="flex:1;height:40px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#374151;cursor:pointer">취소</button>
      <button id="prefinalizeConfirmBtn" style="flex:1;height:40px;border:none;border-radius:8px;background:#3f6ff2;font-size:13px;font-weight:700;color:#fff;cursor:pointer">확인</button>
    </div>
  </div>
</div>

<!-- 다제약물 복약지도문 발송 모달 (4단계) -->
<div id="guideModal" class="modal-backdrop" aria-hidden="true" style="align-items:stretch;padding:0;background:rgba(15,23,42,.45)">
  <div style="display:flex;flex-direction:column;width:100%;max-width:960px;height:100vh;margin:0 auto;background:#fff">

    <!-- 모달 헤더 -->
    <div style="flex-shrink:0;background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div id="gmAvatar" style="width:36px;height:36px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#1d4ed8"></div>

// ─── 전체 요약 탭 렌더 함수들 ────────────────────────────
function side(c){return card('차수별 현황',[['1차',c.join==='참여'?'미진행':'-'],['2차','-'],['3차','-'],['4차','-']])+card('복약 순응도',[['복약일수','2일/13일'],['복약율','15.8%']])}
function card(t,rows){return `<div class="card"><div class="card-title">${t}</div>${rows.map(r=>`<div class="row"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('')}</div>`}
function timeline(c){
  const steps=['동의서 징수','공단 승인','참여 확정','1차 상담','2차 상담','3차 상담','4차 상담'];
  const statusMap={'1차 상담 완료':4,'2차 상담 완료':5,'3차 상담 완료':6,'4차 상담 완료':7};
  let doneUpTo=-1;
  if(statusMap[c.status]!==undefined) doneUpTo=statusMap[c.status]-1;
  else {const idx=steps.indexOf(c.status);if(idx>=0)doneUpTo=idx-1;}
  const activeIdx=doneUpTo+1<steps.length?doneUpTo+1:steps.length-1;
  const allDone=doneUpTo>=steps.length-1;
  return `<div class="box" style="margin-bottom:0"><p class="box-title" style="margin-bottom:14px">사업 진행 단계</p><div class="timeline" style="grid-template-columns:repeat(7,1fr)">${steps.map((s,i)=>{
    const done=i<=doneUpTo||allDone;
    const active=!allDone&&i===activeIdx;
    return `<div class="step ${done?'done':active?'active-step':''}"><div class="circle">${done?'✓':i+1}</div><div class="small"><b>${s}</b><br><span style="color:${done?'#16a34a':active?'#3f6ff2':'#9ca3af'}">${done?'완료':active?'현재 단계':'대기'}</span></div></div>`;
  }).join('')}</div></div>`;
}
function sheets(c){
  const st=c?getS1(c.id):{};
  return `<div class="box"><p class="box-title">디지털 상담지</p><div class="grid4">${['1차 상담지','2차 상담지','3차 상담지','4차 상담지'].map((s,i)=>{
    const finalized=i===0&&st.consultFinalized;
    const statusText=i===0?(finalized?'작성 완료':'작성 대기'):'미진행';
    const statusColor=finalized?'#16a34a':'';
    const btnAction=finalized?`openConsultPopup(${i+1})`:`openConsultConfirm(${i+1})`;
    return `<div class="card sheet"><b>${s}</b><div class="small" style="color:${statusColor};font-weight:${finalized?700:400}">${statusText}</div><button class="btn" onclick="${btnAction}">상담지 열기</button></div>`;
  }).join('')}</div></div>`;
}
function meds(){

  return `<div class="box"><p class="box-title">현재 복용 약물 요약 <span class="badge">1차 상담지 기준</span></p><div class="grid3"><div><b>처방약 (${rx.length}종)</b><div class="small">${rxPreview}</div></div><div><b>OTC</b><div class="small">${GM_MEDS.otc.length?GM_MEDS.otc.join('<br>'):'-'}</div></div><div><b>건기식 (${supp.length}종)</b><div class="small">${suppPreview}</div></div></div><div class="small" style="margin-top:10px">💬 1차 상담지 투약 현황 기준 · 공단 제공 자료와 대조 검토 필요</div></div>`;
}
function bottom(){
  const R=48,CX=66,CY=66,SW=10;
  const circ=+(2*Math.PI*R).toFixed(2);
  const arc=+(circ*0.75).toFixed(2);
  function gauge(pct,title,hint,val,sub){
    const fill=+(arc*(pct/100)).toFixed(2);
    return `<div class="adh-card">
      <div class="adh-card-title">${title}</div>
      <div class="adh-card-hint"><span class="adh-hint-icon">i</span><span class="adh-hint-text">${hint}</span></div>
      <div style="display:flex;justify-content:center;margin-top:8px">
        <svg width="132" height="112" viewBox="0 0 132 128" style="overflow:visible">
          <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="#f3f4f6" stroke-width="${SW}" stroke-dasharray="${arc} ${circ}" transform="rotate(135,${CX},${CY})" stroke-linecap="round"/>
          <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="#ef4444" stroke-width="${SW}" stroke-dasharray="${fill} ${circ}" transform="rotate(135,${CX},${CY})" stroke-linecap="round"/>
          <text x="${CX}" y="${CY-8}" text-anchor="middle" font-size="11" fill="#9ca3af" font-family="-apple-system,sans-serif">미흡</text>
          <text x="${CX}" y="${CY+14}" text-anchor="middle" font-size="${val.length>6?16:18}" font-weight="900" fill="#202733" font-family="-apple-system,sans-serif">${val}</text>

        </svg>
      </div>
    </div>`;
  }
  const bars=[['아침',12.5,'12.5%'],['점심',50,'50%'],['저녁',11.1,'11.1%']];
  return `<div class="box"><p class="box-title">복약 순응도</p>
    <div class="adh-summary-grid">
      ${gauge(15.4,'복약일수','약을 복용한 날짜 수<br>(일부 복용일 포함)','2일 / 13일','(15.4%)')}
      ${gauge(15.8,'복약률','약을 복용한 비율<br>(먹은 약 / 먹어야 할 약)','15.8%','')}
      <div class="adh-card">
        <div class="adh-card-title">시간대별 복약률</div>
        <div class="adh-card-hint"><span class="adh-hint-icon">i</span><span class="adh-hint-text">아침, 점심, 저녁에 각각 먹어야 할 약들 중 몇 %를 먹었습니까?</span></div>
        <div style="margin-top:20px;padding:0 4px">
          ${bars.map(([t,v,lbl])=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
            <span style="font-size:12px;color:#374151;min-width:24px">${t}</span>
            <span style="font-size:13px;font-weight:900;color:#374151;min-width:38px">${lbl}</span>
            <div style="flex:1;height:8px;background:#f3f4f6;border-radius:99px;overflow:hidden">
              <div style="height:100%;width:${v}%;background:#ef4444;border-radius:99px"></div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function initTab1Events(c,st){

  // C4 dashboard iframe
  const iframeWrap=$('#dashboardIframeWrap');
  if(iframeWrap&&!iframeWrap.querySelector('iframe')){
    iframeWrap.style.cssText='margin-bottom:12px;display:grid;grid-template-columns:minmax(0,1fr);overflow:hidden;border-radius:8px;';
    const ifrm=document.createElement('iframe');
    ifrm.src='dashboard_v2.html';
    ifrm.scrolling='no';
    ifrm.style.cssText='border:none;display:block;width:100%;min-width:0;border-radius:8px;';
    ifrm.onload=function(){
      const doc=this.contentWindow.document;
      this.style.height=(doc.documentElement.scrollHeight+4)+'px';
      if(st.consultFinalized)lockIframe();
    };
    iframeWrap.appendChild(ifrm);
  }

  // C2 상담 일자
  if($('#consultDate'))$('#consultDate').onchange=e=>st.date=e.target.value;

  // C2 방식
  $$('.method-btn').forEach(btn=>btn.onclick=()=>{
    $$('.method-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');st.method=btn.dataset.m;
  });

  // C3 투약 추가 버튼
  ['addRx','addOtc','addSupp'].forEach(id=>{const b=$(`#${id}`);if(b)b.onclick=()=>toast('약물 추가 기능은 다음 단계에서 연결합니다.')});
  $$('.med-add-btn').forEach(b=>{if(!b.id)b.onclick=()=>toast('수정 기능은 다음 단계에서 연결합니다.')});

  // C4 자동 생성
  if($('#autoFillBtn'))$('#autoFillBtn').onclick=()=>{
    toast('상담지가 앱 데이터 기반으로 자동 채워졌습니다.');
  };

  // iframe 수정 잠금 함수
  function lockIframe(){
    const wrap=$('#dashboardIframeWrap');
    if(!wrap||wrap.querySelector('.iframe-lock'))return;
    wrap.style.position='relative';
    const lock=document.createElement('div');
    lock.className='iframe-lock';
    lock.style.cssText='position:absolute;inset:0;z-index:10;cursor:default;';
    wrap.appendChild(lock);
  }

  // 확정 처리 공통 함수
  function doFinalize(afterAction){
    st.consultFinalized=true;
    if($('#finalizeBtn')){$('#finalizeBtn').textContent='✓ 확정 완료';$('#finalizeBtn').classList.remove('primary');}
    if($('#autoFillBtn'))$('#autoFillBtn').disabled=true;
    const memo=st.c4Memo||'';
    if($('#printBtn'))$('#printBtn').onclick=()=>printWithMemo(memo);
    if($('#pdfBtn'))$('#pdfBtn').onclick=()=>pdfWithMemo(memo);
    const ta=$('#c4MemoText');if(ta){ta.setAttribute('readonly','');ta.style.background='#f9fafb';}
    const memoButtons=$('#c4MemoWrap').querySelector('div[style*="flex-end"]');if(memoButtons)memoButtons.remove();
    lockIframe();
    toast('상담지가 최종 확정되었습니다.');
    if(afterAction==='print')printWithMemo(memo);
    else if(afterAction==='pdf')pdfWithMemo(memo);
  }

  // 이미 확정된 경우 초기화
  if(st.consultFinalized){
    const memo=st.c4Memo||'';
    if($('#printBtn'))$('#printBtn').onclick=()=>printWithMemo(memo);
    if($('#pdfBtn'))$('#pdfBtn').onclick=()=>pdfWithMemo(memo);
    // iframe이 로드된 뒤 잠금
    const ifrm2=$('#dashboardIframeWrap iframe');
    if(ifrm2){if(ifrm2.complete||ifrm2.contentDocument)lockIframe();else ifrm2.addEventListener('load',lockIframe);}
  }

  // C4 최종 확정

}

function gmUpdateStepUI(step){
  $$('.gm-step').forEach(s=>{

}

        <div style="font-size:12px;color:#6b7280;margin-bottom:8px">체크된 약물이 환자에게 전달되는 "꼭 드셔야 할 약물" 리스트입니다.</div>
        <div id="gmKeepList">${keepHTML}</div>
      </div>

      <div style="height:1px;background:#f1f5f9;margin:16px 0"></div>

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:14px;font-weight:900;color:#111827">🗑 정리할 약</span>
          <span style="font-size:11px;color:#dc2626;background:#fee2e2;padding:2px 8px;border-radius:99px;font-weight:700">중단/폐기 권고</span>

        <button id="gmAddDiscard" style="width:100%;height:34px;border:1px dashed #fca5a5;border-radius:7px;background:#fff;font-size:12px;color:#dc2626;cursor:pointer;margin-top:4px">+ 정리할 약 추가</button>
      </div>

      <div style="height:1px;background:#f1f5f9;margin:16px 0"></div>

      <!-- 주의사항 -->
      <div style="margin-bottom:20px">
        <div style="font-size:14px;font-weight:900;color:#111827;margin-bottom:8px">⚠️ 주의사항</div>
        ${_gmDoc.cautions.map(c=>`<div style="padding:8px 12px;border-left:3px solid #f59e0b;background:#fffbeb;border-radius:0 6px 6px 0;font-size:12px;color:#374151;margin-bottom:6px;line-height:1.6;white-space:pre-line">${c}</div>`).join('')}
      </div>

      <div style="height:1px;background:#f1f5f9;margin:16px 0"></div>

      <!-- 약사 의견 -->
      <div>
        <div style="font-size:14px;font-weight:900;color:#111827;margin-bottom:6px">💬 약사 의견</div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:8px">이번 상담에서의 소견을 자유롭게 기록하세요. 복약지도문에 포함되어 전달됩니다.</div>
        <textarea id="gmOpinion" class="field-textarea" rows="4" placeholder="예) 현재 혈압약과 혈당약을 꾸준히 복용 중이십니다. 중복 처방된 메트포르민을 정리하고, 이후 복약 순응도를 개선하는 것이 중요합니다." style="background:#fff">${_gmDoc.opinion}</textarea>
      </div>
    </div>
  </div>`;
}

function gmStep3HTML(){
  const keep=Object.entries(_gmDoc.keepMeds).filter(([,v])=>v).map(([k])=>k);
  const discard=_gmDoc.discardMeds;
  const opinion=$('#gmOpinion')?$('#gmOpinion').value:_gmDoc.opinion;
  const preview=`[웰체크 다제약물 복약지도문]\n안녕하세요, ${_gmPatient?_gmPatient.name:'환자'}님.\n1차 다제약물 관리 상담 결과를 안내드립니다.\n\n✅ 이것만 드세요 (${keep.length}종)\n${keep.map((m,i)=>`${i+1}. ${m}`).join('\n')}\n\n🗑 정리하실 약 (${discard.length}종)\n${discard.map((m,i)=>`${i+1}. ${m}`).join('\n')}\n\n⚠️ 주의사항\n${_gmDoc.cautions.join('\n')}\n${opinion?'\n💬 약사 의견\n'+opinion:''}\n\n문의: 하나누리 약국 김체크 약사`;

  const methods=[
    {id:'kakao',icon:'💬',label:'카카오 알림톡',sub:'카카오톡으로 즉시 발송됩니다.'},
    {id:'app',icon:'📱',label:'환자 앱 전송',sub:'웰체크 앱으로 전달됩니다.'},
  ];

  return `<div style="padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">
    <div>
      <div style="font-size:13px;font-weight:900;color:#111827;margin-bottom:12px">발송 방법 선택</div>
      ${methods.map(m=>`<label style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:10px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;margin-bottom:10px;transition:border .15s" data-method="${m.id}" id="gml-${m.id}">
        <input type="radio" name="gmMethod" value="${m.id}" ${_gmDoc.sendMethod===m.id?'checked':''} style="accent-color:#3f6ff2;width:16px;height:16px">
        <span style="font-size:18px">${m.icon}</span>
        <div><div style="font-size:13px;font-weight:800;color:#111827">${m.label}</div><div style="font-size:11px;color:#6b7280;margin-top:1px">${m.sub}</div></div>
      </label>`).join('')}
    </div>
    <div>
      <div style="font-size:13px;font-weight:900;color:#111827;margin-bottom:8px">복약지도문 미리보기</div>
      <div style="border:1px solid #e5e7eb;border-radius:10px;background:#fafafa;padding:16px;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;color:#374151">${preview}</div>
    </div>
  </div>`;
}

function gmStep4HTML(){
  const name=_gmPatient?_gmPatient.name:'환자';
  const methodLabel={'kakao':'카카오 알림톡','app':'환자 앱','pdf':'PDF','print':'인쇄'}[_gmDoc.sendMethod]||'선택한 방법';
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center">
    <div style="width:72px;height:72px;border-radius:50%;background:#f0fdf4;border:2px solid #bbf7d0;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px">✅</div>
    <div style="font-size:22px;font-weight:900;color:#111827;margin-bottom:8px">전송 완료</div>
    <div style="font-size:14px;color:#4b5563;line-height:1.7">${name}님께 복약지도문이 <b>${methodLabel}</b>으로 발송되었습니다.</div>
    <div style="margin-top:24px;padding:14px 20px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;font-size:12px;color:#6b7280;line-height:1.7;text-align:left;min-width:280px">
      <div><b style="color:#374151">발송 시각</b> 2026-05-29 · 지금</div>
      <div><b style="color:#374151">발송자</b> 김체크 약사 (하나누리 약국)</div>
      <div><b style="color:#374151">차수</b> 1차 상담 복약지도문</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="window.print()" style="display:flex;align-items:center;gap:6px;padding:10px 20px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#374151;cursor:pointer">🖨 인쇄</button>
      <button onclick="toast('PDF 저장 기능은 다음 단계에서 연결합니다.')" style="display:flex;align-items:center;gap:6px;padding:10px 20px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#374151;cursor:pointer">⬇ PDF 저장</button>
    </div>
  </div>`;

function gmRenderStep(step){
  _gmStep=step;
  gmUpdateStepUI(step);
  const body=$('#gmBody');
  body.style.padding='0';
  if(step===1)body.innerHTML=gmStep1HTML();
  else if(step===2){body.innerHTML=gmStep2HTML();gmBindStep2();}
  else if(step===3){body.innerHTML=gmStep3HTML();gmBindStep3();}
  else body.innerHTML=gmStep4HTML();
}

function gmBindStep2(){
  $$('#gmKeepList input[type=checkbox]').forEach(cb=>{
    cb.onchange=()=>{
      const m=cb.dataset.keep;
      _gmDoc.keepMeds[m]=cb.checked;
      gmRenderStep(2);
    };
  });
  const addBtn=$('#gmAddDiscard');
  if(addBtn)addBtn.onclick=()=>{
    const name=prompt('정리할 약 이름을 입력하세요:');
    if(name&&name.trim()){_gmDoc.discardMeds.push(name.trim());gmRenderStep(2);}
  };
  if($('#gmOpinion'))$('#gmOpinion').oninput=e=>{_gmDoc.opinion=e.target.value;};
}

function gmBindStep3(){
  $$('input[name=gmMethod]').forEach(r=>{
    r.onchange=()=>{
      _gmDoc.sendMethod=r.value;
      $$('label[data-method]').forEach(l=>{
        const sel=l.dataset.method===r.value;
        l.style.borderColor=sel?'#3f6ff2':'#e5e7eb';
        l.style.background=sel?'#eff6ff':'#fff';
      });
    };
    if(r.value===_gmDoc.sendMethod){
      r.closest('label').style.borderColor='#3f6ff2';
      r.closest('label').style.background='#eff6ff';
    }
  });
}

function gmInitDocFromSt(st){
  const probs=(st&&st.problems)||[];
  const allMeds=[...GM_MEDS.rx,...GM_MEDS.otc,...GM_MEDS.supp];

  // cautions: 상담지 약물관련문제에서 생성
  _gmDoc.cautions=probs.length
    ? probs.map(p=>`${p.drug} ${p.type==='상호작용'?'병용 시 주의':p.type==='중복투약'?'중복 처방 확인':p.sev+' 주의'}\n→ ${p.action}`)
    : [];

  // discardMeds: 중복투약 문제에서 해당 약물 매칭
  const discardKeys=new Set();
  const discardMeds=[];
  probs.filter(p=>p.type==='중복투약').forEach(p=>{
    const keyword=p.drug.replace(/중복.*/,'').trim().split(' ')[0];
    const matched=allMeds.filter(m=>m.includes(keyword));
    if(matched.length>=2){
      // 중복 중 첫 번째(낮은 용량 등) 폐기
      discardMeds.push(matched[0]+' (중복 처방 확인됨)');
      discardKeys.add(matched[0]);
    } else if(matched.length===1){
      discardMeds.push(matched[0]+' (중복 처방 확인됨)');
      discardKeys.add(matched[0]);
    } else {
      discardMeds.push(p.drug+' (처방 확인 필요)');
    }
  });
  _gmDoc.discardMeds=discardMeds;

  // keepMeds: 전체 약물 기본 true, 폐기 약물만 false
  const keepMeds={};
  allMeds.forEach(m=>keepMeds[m]=!discardKeys.has(m));
  _gmDoc.keepMeds=keepMeds;

  // opinion: 상담지 약사 의견 초기값
  _gmDoc.opinion=(st&&st.opinion)||'';
  _gmDoc.sendMethod='';
}

function openGuideModal(c,st){
  _gmPatient=c;_gmSt=st;
  gmInitDocFromSt(st);
  if(c){
    $('#gmAvatar').textContent=c.name[0];
    $('#gmName').textContent=c.name;
    $('#gmSub').textContent=`${c.birth} · ${c.ageGender} · ${c.phone}`;
  }
  $('#guideModal').classList.add('open');$('#guideModal').setAttribute('aria-hidden','false');
  gmRenderStep(1);

  $('#gmPrev').onclick=()=>{if(_gmStep>1)gmRenderStep(_gmStep-1);};
  $('#gmNext').onclick=()=>{
    if(_gmStep===4){
      closeGuideModal();
      const sideBtn=$('#sideGuideBtn');
      if(sideBtn){sideBtn.textContent='복약지도문 내용 보기';sideBtn.style.background='#fff';sideBtn.style.color='#3f6ff2';sideBtn.style.border='1px solid #3f6ff2';}
      return;
    }
    if(_gmStep===2){
      // 의견 저장
      if($('#gmOpinion'))_gmDoc.opinion=$('#gmOpinion').value;
    }
    if(_gmStep===3){
      if(!_gmDoc.sendMethod){toast('발송 방법을 선택하세요.');return;}
      gmRenderStep(4);
      return;
    }
    gmRenderStep(_gmStep+1);
  };
}
function closeGuideModal(){$('#guideModal').classList.remove('open');$('#guideModal').setAttribute('aria-hidden','true')}

// ─── 빠른 연락 모달 (C9) ──────────────────────────────────

  appt:'[웰체크] 안녕하세요. 하나누리 약국입니다.\n다제약물 관리 상담 일정을 안내드립니다.\n■ 일시: 2026-05-30 14:00\n■ 방식: 유선 상담\n문의: 02-0000-0000',
  check:'[웰체크] 안녕하세요. 하나누리 약국입니다.\n이번 주 복약은 잘 되고 계신가요? 불편하신 점이 있으시면 언제든 알려주세요.',
  result:'[웰체크] 안녕하세요. 하나누리 약국입니다.\n오늘 1차 상담 결과를 안내드립니다. 상세 복약지도문은 앱에서 확인하실 수 있습니다.'
};

}

// ─── 네비게이션 이벤트 ────────────────────────────────────
$$('.nav button').forEach(b=>{b.onclick=()=>b.dataset.page?renderList(b.dataset.page):toast(b.dataset.message)});

  $$('.quick-tpl').forEach(t=>t.classList.remove('sel'));b.classList.add('sel');

});

renderList('customers');

// iframe 높이 동기화 — dashboard_v2.html의 ResizeObserver가 보내는 메시지 수신
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'iframeResize') return;
  const h = e.data.height + 4;
  // consultPopupIframe
  const popupIframe = $('#consultPopupIframe');
  if (popupIframe && popupIframe.contentWindow === e.source) {
    popupIframe.style.height = h + 'px'; return;
  }
  // dashboardIframeWrap iframe
  const dashIframe = $('#dashboardIframeWrap iframe');
  if (dashIframe && dashIframe.contentWindow === e.source) {
    dashIframe.style.height = h + 'px';
  }
});

})();
</script>
