<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>CL note 복약 상담</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:transparent;margin:0;padding:0;}

/* ── BACKDROP ── */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;}
.backdrop.on{display:flex;}

/* ── 투 패널 오버레이 ── */
.overlay-wrap{display:flex;gap:14px;align-items:flex-start;animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* 왼쪽: 모달 패널 */
.modal-panel{width:680px;flex-shrink:0;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.28);display:flex;flex-direction:column;height:86vh;}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid #E8EAED;flex-shrink:0;}
.modal-title{font-size:21.6px;font-weight:700;color:#111;}
.modal-x{width:30px;height:30px;background:none;border:none;cursor:pointer;color:#888;font-size:21.6px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.modal-x:hover{background:#F4F5F7;}
.modal-pt{display:none;align-items:center;gap:12px;padding:10px 24px;border-bottom:1px solid #E8EAED;flex-shrink:0;background:#F8FBFF;}
.modal-pt.on{display:flex;}
.modal-pt-avatar{width:32px;height:32px;border-radius:50%;background:#EBF2FF;color:#2563EB;font-size:14.4px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-pt-name{font-size:16.8px;font-weight:700;color:#111;}
.modal-pt-info{font-size:14.4px;color:#888;margin-left:4px;}
.modal-pt-remove{margin-left:auto;padding:4px 10px;background:none;border:1px solid #E0E0E0;border-radius:6px;font-size:13.8px;color:#888;cursor:pointer;font-family:inherit;white-space:nowrap;}
.modal-pt-remove:hover{background:#FEE2E2;border-color:#FCA5A5;color:#DC2626;}
.step-tabs{display:flex;border-bottom:1px solid #E8EAED;flex-shrink:0;}
.step-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:11px 0;font-size:13.8px;color:#BBB;border-bottom:2px solid transparent;white-space:nowrap;}
.step-tab.on{color:#2563EB;border-bottom-color:#2563EB;font-weight:600;}
.step-num{width:17px;height:17px;border-radius:50%;background:#E8EAED;color:#AAA;font-size:14.4px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-tab.on .step-num{background:#2563EB;color:#fff;}
.modal-body{padding:16px 24px;overflow-y:auto;flex:1;}
.modal-ft{padding:14px 24px 20px;display:flex;align-items:center;justify-content:flex-end;gap:10px;border-top:1px solid #E8EAED;flex-shrink:0;}
.close-confirm-bar{display:flex;align-items:center;gap:10px;padding:10px 24px;background:#FFF5F5;border-bottom:1px solid #FED7D7;flex-shrink:0;}
.ccb-txt{font-size:16.2px;color:#DC2626;font-weight:500;margin-right:auto;line-height:1.4;}
.ccb-btn-cancel{height:34px;padding:0 16px;background:#2563EB;border:none;border-radius:7px;font-size:15.6px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;}
.ccb-btn-confirm{height:34px;padding:0 16px;background:#fff;border:1px solid #E0E0E0;border-radius:7px;font-size:15.6px;color:#555;cursor:pointer;font-family:inherit;white-space:nowrap;}

/* Step 1 고객 선택 */
.s1-guide{font-size:15.6px;color:#888;margin-bottom:16px;}
#modalPt.on ~ .step-tabs ~ #mbody .s1-guide,
#modalPt.on ~ .step-tabs ~ #mbody .s1-search-wrap,
#modalPt.on ~ .step-tabs ~ #mbody .s1-error-msg{display:none!important;}
.s1-error-msg{font-size:18px;color:#E53E3E;margin-top:-10px;margin-bottom:12px;padding:0 2px;}
.s1-search-wrap{position:relative;margin-bottom:16px;}
.s1-search{width:100%;height:40px;border:1px solid #E0E0E0;border-radius:8px;padding:0 36px 0 12px;font-size:15.6px;font-family:inherit;outline:none;}
.s1-search:focus{border-color:#2563EB;}
.s1-search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none;}
.s1-result-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid #E8EAED;border-radius:8px;cursor:pointer;transition:background .1s;margin-bottom:6px;}
.s1-result-item:hover{background:#F8FBFF;border-color:#2563EB;}
.s1-result-item.selected{background:#EBF2FF;border-color:#2563EB;}
.s1-result-name{font-size:16.8px;font-weight:600;color:#111;}
.s1-result-info{font-size:14.4px;color:#888;margin-top:2px;}
.s1-empty{text-align:center;padding:20px 0 8px;color:#AAA;font-size:15.6px;}
.s1-add-btn{width:100%;margin-top:12px;padding:11px;border:1.5px dashed #2563EB;border-radius:8px;background:#F0F6FF;color:#2563EB;font-size:15.6px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .1s;}
.s1-add-btn:hover{background:#E0EDFF;}
.s1-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #E8EAED;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;overflow:hidden;}
.s1-dropdown .s1-result-item{border-radius:0;border:none;border-bottom:1px solid #F0F0F0;margin-bottom:0;}
.s1-empty-dd{text-align:center;padding:16px 0 8px;color:#AAA;font-size:15.6px;}
.s1-add-inline-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:#EBF2FF;border-bottom:1px solid #D8E4FC;}
.s1-add-inline-left{display:flex;align-items:center;gap:10px;min-width:0;}
.s1-add-inline-avatar{width:28px;height:28px;border-radius:50%;background:#fff;color:#2563EB;font-size:14.4px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.s1-add-inline-name{font-size:16.8px;font-weight:600;color:#111;}
.s1-add-inline-sub{font-size:13.8px;color:#5B7FD1;margin-top:1px;}
.s1-add-inline-btn{padding:6px 14px;border:none;border-radius:7px;background:#2563EB;color:#fff;font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.s1-add-inline-btn:hover{background:#1D4ED8;}
.btn-next{height:40px;padding:0 28px;background:#2563EB;border:none;border-radius:8px;font-size:15.6px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;}
.btn-next:disabled{opacity:.4;cursor:not-allowed;}
.btn-cancel{height:40px;padding:0 20px;background:#fff;border:1px solid #E0E0E0;border-radius:8px;font-size:15.6px;color:#555;cursor:pointer;font-family:inherit;}

/* Step 1 처방전 선택 */
.s1-s2-divider{border-top:1px solid #E8EAED;margin:20px 0 16px;}
.s2-label{font-size:14.4px;font-weight:600;color:#555;margin-bottom:10px;display:block;}
.s2-date-group{margin-bottom:14px;}
.s2-date-header{font-size:13.8px;font-weight:700;color:#888;padding:0 2px 6px;display:flex;align-items:center;gap:6px;}
.s2-date-count{font-size:13.2px;background:#F0F0F0;color:#777;padding:1px 7px;border-radius:10px;font-weight:600;}
.s2-rx-list{display:flex;flex-direction:column;gap:0;}
.s2-rx-item{width:100%;margin-bottom:6px;}
.s2-rx-card{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid #E8EAED;border-radius:10px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none;width:100%;box-sizing:border-box;}
.s2-rx-card:hover{border-color:#A0B4FF;background:#FAFBFF;}
.s2-rx-card.checked{border-color:#2563EB;background:#EBF2FF;border-bottom-left-radius:0;border-bottom-right-radius:0;}
.s2-rx-card-check{width:17px;height:17px;accent-color:#2563EB;cursor:pointer;flex-shrink:0;}
.s2-rx-card-body{flex:1;min-width:0;overflow:hidden;}
.s2-rx-card-top{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;}
.s2-rx-card-hospital{font-size:15.6px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s2-rx-card-dept{font-size:14.4px;color:#888;white-space:nowrap;flex-shrink:0;}
.s2-rx-card-meta{font-size:13.8px;color:#AAA;margin-top:1px;}
.s2-rx-card-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.s2-rx-card-chip{font-size:13.2px;padding:2px 8px;border-radius:10px;background:#F4F5F7;color:#666;white-space:nowrap;}
.s2-rx-card.checked .s2-rx-card-chip{background:#D1E0FF;color:#1D4ED8;}
.s2-rx-chevron{transition:transform .18s;color:#BBB;flex-shrink:0;}
.s2-rx-card.checked .s2-rx-chevron{transform:rotate(180deg);color:#2563EB;}
.s2-rx-expand{display:none;width:100%;box-sizing:border-box;border:1.5px solid #2563EB;border-top:none;border-bottom-left-radius:10px;border-bottom-right-radius:10px;overflow:hidden;}
.s2-rx-expand.open{display:block;}
.s2-rx-box{border:none;}
.s2-rx-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#F0F5FF;border-bottom:1px solid #D1E0FF;gap:8px;}
.s2-rx-hd-info{font-size:18px;color:#333;min-width:0;}
.s2-rx-hd-info strong{font-weight:700;color:#111;}
.s2-rx-img-btn{padding:5px 12px;border:1px solid #E0E0E0;border-radius:6px;background:#fff;font-size:13.8px;color:#555;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;}
.s2-rx-img-btn:hover{background:#F4F5F7;}
.s2-drug-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.s2-drug-table thead tr{background:#F8F9FA;}
.s2-drug-table th{padding:8px 12px;font-size:13.2px;font-weight:600;color:#888;text-align:left;border-bottom:1px solid #E8EAED;}
.s2-drug-table td{padding:10px 12px;font-size:18px;color:#333;border-bottom:1px solid #F2F4F6;word-break:keep-all;overflow-wrap:break-word;}
.s2-drug-table tbody tr:last-child td{border-bottom:none;}
.s2-drug-table th:nth-child(1),.s2-drug-table td:nth-child(1){width:38%;}
.s2-drug-table th:nth-child(2),.s2-drug-table td:nth-child(2){width:13%;text-align:center;}
.s2-drug-table th:nth-child(3),.s2-drug-table td:nth-child(3){width:16%;text-align:center;}
.s2-drug-table th:nth-child(4),.s2-drug-table td:nth-child(4){width:12%;text-align:center;}
.s2-drug-table th:nth-child(5),.s2-drug-table td:nth-child(5){width:11%;text-align:center;}
.s2-drug-table th:nth-child(6),.s2-drug-table td:nth-child(6){width:10%;text-align:center;}
.s2-drug-name{font-weight:500;color:#111;}
.s2-drug-sub{font-size:13.2px;color:#888;margin-top:1px;}
.s2-consent-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 16px;background:#FFF1F1;border-top:1px solid #FCA5A5;}
.s2-consent-left{display:flex;align-items:flex-start;gap:10px;}
.s2-consent-icon{width:20px;height:20px;border-radius:50%;border:2px solid #DC2626;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.s2-consent-icon span{font-size:13.2px;font-weight:900;color:#DC2626;line-height:1;}
.s2-consent-title{font-size:15.6px;font-weight:700;color:#DC2626;}
.s2-consent-sub{font-size:13.8px;color:#EF4444;margin-top:2px;}
.s2-consent-radios{display:flex;align-items:center;gap:16px;flex-shrink:0;}
.s2-consent-radio{display:flex;align-items:center;gap:5px;font-size:15.6px;color:#333;cursor:pointer;font-weight:500;}
.s2-consent-radio input[type="radio"]{width:16px;height:16px;accent-color:#2563EB;cursor:pointer;}
.s2-empty-tip{text-align:center;padding:40px 0;color:#AAA;font-size:15.6px;}
.s2-more-btn{width:100%;margin-top:4px;margin-bottom:4px;padding:10px;border:1.5px dashed #D0D8E8;border-radius:8px;background:#F8FBFF;color:#5B7FD1;font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .1s;}
.s2-more-btn:hover{background:#EBF2FF;}

/* Step 2 처방 변경 */
.s2-drug-table th:last-child,.s2-drug-table td:last-child{text-align:center;width:64px;}
.s2-drug-table th.th-action{width:64px;}
.s2-drug-table td.td-action{text-align:center;padding:6px 4px;display:flex;align-items:center;justify-content:center;gap:2px;}
.s2-row-edit-btn{width:26px;height:26px;border:none;background:none;cursor:pointer;color:#BBB;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;}
.s2-row-edit-btn:hover{background:#F4F5F7;color:#555;}
.s2-row-del-btn{width:26px;height:26px;border:none;background:none;cursor:pointer;color:#BBB;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;}
.s2-row-del-btn:hover{background:#FEE2E2;color:#DC2626;}
.s2-add-drug-row{display:flex;align-items:center;justify-content:center;padding:10px 12px;border-top:1px dashed #E0E4EF;}
.s2-add-drug-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1.5px dashed #2563EB;border-radius:6px;background:#F0F6FF;color:#2563EB;font-size:14.4px;font-weight:600;cursor:pointer;font-family:inherit;}
.s2-add-drug-btn:hover{background:#E0EDFF;}
.s2-edit-row td{background:#F0F6FF;padding:10px 12px;}
.s2-edit-form{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.s2-edit-field{display:flex;flex-direction:column;gap:3px;}
.s2-edit-field label{font-size:12.6px;color:#666;font-weight:600;}
.s2-edit-field input,.s2-edit-field select{height:32px;border:1px solid #C7D7F5;border-radius:6px;padding:0 8px;font-size:14.4px;font-family:inherit;outline:none;background:#fff;min-width:0;}
.s2-edit-field input:focus,.s2-edit-field select:focus{border-color:#2563EB;}
.s2-edit-field.f-name input{width:200px;}
.s2-edit-field.f-ing input{width:130px;}
.s2-edit-field.f-dosage input{width:70px;}
.s2-edit-field.f-freq input{width:90px;}
.s2-edit-field.f-days input{width:60px;}
.s2-edit-actions{display:flex;gap:6px;margin-left:auto;}
.s2-edit-save{height:32px;padding:0 14px;background:#2563EB;border:none;border-radius:6px;font-size:14.4px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;}
.s2-edit-cancel{height:32px;padding:0 12px;background:#fff;border:1px solid #E0E0E0;border-radius:6px;font-size:14.4px;color:#555;cursor:pointer;font-family:inherit;}
.s2-add-form-row{background:#F8FBFF;}
.s2-add-form-row td{padding:12px 14px;}
.s2-changed-badge{display:inline-block;background:#EBF2FF;color:#2563EB;font-size:14.4px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle;}
.s2-poly-alert{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#FFF1F1;border:1.5px solid #FCA5A5;border-radius:8px;margin-bottom:16px;}
.s2-poly-alert-icon{width:20px;height:20px;border-radius:50%;border:2px solid #DC2626;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.s2-poly-alert-icon span{font-size:13.2px;font-weight:900;color:#DC2626;line-height:1;}
.s2-poly-alert-txt{font-size:18px;font-weight:600;color:#DC2626;}

/* ── Step 3 복약지도 전송 ── */
.s4-grid{display:grid;grid-template-columns:200px 1fr;gap:20px;}
.tag-ttl{font-size:15.6px;font-weight:700;color:#111;margin-bottom:12px;}
.tag-chips{display:flex;flex-direction:column;gap:8px;}
.tag-chip{padding:9px 13px;border:1.5px solid #E0E0E0;border-radius:8px;font-size:18px;color:#444;cursor:pointer;line-height:1.4;transition:all .12s;font-family:inherit;background:#fff;text-align:left;}
.tag-chip:hover{border-color:#A5BCEC;background:#F4F8FF;}
.tag-chip.on{border-color:#2563EB;background:#EBF2FF;color:#2563EB;font-weight:600;}
.msg-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.msg-ttl{font-size:15.6px;font-weight:700;color:#111;}
.msg-reset{font-size:14.4px;color:#AAA;cursor:pointer;background:none;border:none;font-family:inherit;}
.msg-reset:hover{color:#2563EB;}
.msg-ta{width:100%;height:260px;border:1.5px solid #E0E0E0;border-radius:10px;padding:14px;font-size:18px;line-height:1.8;color:#333;resize:none;font-family:inherit;transition:border-color .15s;}
.msg-ta:focus{outline:none;border-color:#2563EB;}
.msg-cnt{text-align:right;font-size:13.2px;color:#BBB;margin-top:4px;}
.cpl-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;gap:16px;text-align:center;}
.cpl-ttl{font-size:21.6px;font-weight:700;color:#111;}
.cpl-sub{font-size:16.8px;color:#777;}
.btn-close-cpl{height:44px;padding:0 48px;background:#2563EB;border:none;border-radius:10px;font-size:16.8px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;}
/* Step 4 미리보기 */
.prev-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.prev-msg{background:#FFF9E6;border-radius:10px;padding:16px;font-size:14.4px;line-height:1.9;color:#333;min-height:calc(52vh - 110px);overflow-y:auto;max-height:calc(52vh - 110px);}
.sum-tbl{width:100%;border-collapse:collapse;}
.sum-tbl tr{border-bottom:1px solid #F2F4F6;}
.sum-tbl td{padding:11px 4px;font-size:15.6px;vertical-align:middle;}
.sum-tbl td:first-child{color:#888;width:90px;white-space:nowrap;}
.sum-tbl td:last-child{color:#333;font-weight:500;}
.s4-phone-input{width:100%;height:36px;border:1px solid #E0E0E0;border-radius:6px;padding:0 10px;font-size:15.6px;font-family:inherit;outline:none;margin-top:4px;}
.s4-phone-input:focus{border-color:#2563EB;}
/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#1E293B;color:#fff;padding:10px 22px;border-radius:24px;font-size:15.6px;font-weight:500;opacity:0;transition:opacity .22s,transform .22s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 처방전 이미지 뷰어 레이어 */
.rx-viewer-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;align-items:center;justify-content:center;}
.rx-viewer-bd.on{display:flex;}
.rx-viewer-box{background:#fff;border-radius:12px;width:480px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.4);}
.rx-viewer-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #E8EAED;flex-shrink:0;}
.rx-viewer-title{font-size:21.6px;font-weight:700;color:#111;}
.rx-viewer-x{width:30px;height:30px;background:none;border:none;cursor:pointer;color:#888;font-size:21.6px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.rx-viewer-x:hover{background:#F4F5F7;}
.rx-viewer-img{flex:1;overflow-y:auto;padding:16px;display:flex;align-items:center;justify-content:center;background:#F8F9FA;}
.rx-viewer-img img{width:100%;border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.rx-viewer-placeholder{text-align:center;padding:40px 20px;color:#888;}
.rx-viewer-placeholder .rx-icon{font-size:57.6px;margin-bottom:12px;}
.rx-viewer-placeholder p{font-size:15.6px;line-height:1.7;}

/* 오른쪽: 퍼즐 AI 패널 */
.puzzle-panel{width:320px;flex-shrink:0;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.28);display:flex;flex-direction:column;height:86vh;overflow:hidden;border:1px solid #E8EBF0;}
.pz-header{padding:16px 16px 10px;border-bottom:1px solid #F0F2F5;flex-shrink:0;background:#fff;}
.pz-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.pz-name{font-size:19.2px;font-weight:700;color:#111;}
.pz-name-sub{font-size:15.6px;font-weight:400;color:#666;margin-left:2px;}
.pz-icons{display:flex;gap:4px;}
.pz-icon-btn{width:28px;height:28px;background:none;border:none;color:#888;font-size:16.8px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.pz-icon-btn:hover{background:#F5F6F8;}
.pz-visit-bar{display:inline-flex;align-items:center;gap:0;background:#F4F6FA;border-radius:20px;padding:5px 12px;font-size:13.2px;color:#555;cursor:pointer;flex-wrap:wrap;gap:4px;}
.pz-visit-dot{width:6px;height:6px;border-radius:50%;background:#3B82F6;display:inline-block;flex-shrink:0;}
.pz-visit-sep{color:#CCC;margin:0 4px;}
.pz-chat{flex:1;overflow-y:auto;padding:16px 18px;font-size:15.6px;color:#333;line-height:1.85;background:#fff;}
.pz-chat::-webkit-scrollbar{width:3px;}
.pz-chat::-webkit-scrollbar-thumb{background:#DDD;border-radius:2px;}
.pz-sparkle-wrap{position:relative;flex-shrink:0;}
.pz-sparkle-btn{position:absolute;right:14px;bottom:8px;background:#fff;border:1.5px solid #E0E4EF;border-radius:20px;padding:6px 14px;color:#555;font-size:14.4px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:2;}
.pz-sparkle-btn:hover{background:#F5F6FF;border-color:#C7CEFF;}
.pz-bottom{flex-shrink:0;border-top:1px solid #F0F2F5;background:#fff;}
.pz-chips{display:flex;gap:8px;padding:10px 14px 8px;overflow-x:auto;}
.pz-chips::-webkit-scrollbar{display:none;}
.pz-chip{padding:6px 12px;border:1px solid #E0E4EF;border-radius:20px;font-size:13.8px;color:#444;cursor:pointer;white-space:nowrap;background:#fff;font-family:inherit;flex-shrink:0;}
.pz-chip:hover{background:#F0F4FF;border-color:#A0B4FF;}
.pz-input-row{display:flex;align-items:center;gap:8px;padding:6px 14px 14px;}
.pz-mic-btn{width:40px;height:40px;border-radius:50%;background:#2563EB;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:micPulse 1.5s ease-in-out infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 3px rgba(37,99,235,.18)}50%{box-shadow:0 0 0 8px rgba(37,99,235,.05)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.pz-input-box{flex:1;display:flex;align-items:center;gap:6px;background:#F4F6FA;border:1px solid #E8EBF0;border-radius:20px;padding:8px 12px;}
.pz-input{flex:1;background:none;border:none;font-size:14.4px;color:#333;font-family:inherit;outline:none;min-width:0;}
.pz-input::placeholder{color:#AAB2C0;}
.pz-wave{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.pz-wave span{display:inline-block;width:2.5px;background:#2563EB;border-radius:2px;animation:wave .8s ease-in-out infinite;}
.pz-wave span:nth-child(1){height:4px;animation-delay:0s;}
.pz-wave span:nth-child(2){height:9px;animation-delay:.12s;}
.pz-wave span:nth-child(3){height:14px;animation-delay:.24s;}
.pz-wave span:nth-child(4){height:9px;animation-delay:.36s;}
.pz-wave span:nth-child(5){height:4px;animation-delay:.48s;}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.7)}}
.pz-rec-bar{display:flex;align-items:center;gap:8px;padding:4px 16px 0;flex-shrink:0;}
.pz-rec-dot{width:7px;height:7px;border-radius:50%;background:#EF4444;animation:blink 1s ease-in-out infinite;}
.pz-rec-label{font-size:13.2px;color:#888;font-weight:500;}
.pz-rec-time{margin-left:auto;font-size:13.2px;color:#888;font-variant-numeric:tabular-nums;}
/* ── 마이크 권한 레이어 ── */
.mic-perm-layer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;align-items:center;justify-content:center;}
.mic-perm-layer.on{display:flex;}
.mic-perm-box{background:#fff;border-radius:16px;padding:36px 36px 28px;max-width:380px;width:90%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;}
.mic-perm-icon{font-size:52.8px;line-height:1;}
.mic-perm-title{font-size:20.4px;font-weight:700;color:#111;}
.mic-perm-desc{font-size:15.6px;color:#555;line-height:1.8;}
.mic-perm-btn{height:44px;padding:0 32px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:16.8px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;}
.mic-perm-btn:hover{background:#1e52c8;}
.mic-perm-btn:disabled{opacity:.5;cursor:not-allowed;}
.mic-perm-hint{font-size:14.4px;color:#999;line-height:1.7;margin-top:2px;}

function closeModal() {
  if (!selectedCustomer) { doCloseModal(); return; }
  document.getElementById('closeConfirmBar').style.display = 'flex';
  document.getElementById('modalX').style.display = 'none';
}
function cancelClose() {
  document.getElementById('closeConfirmBar').style.display = 'none';
  document.getElementById('modalX').style.display = '';
}
function confirmClose() { doCloseModal(); }
function setBeforeUnloadGuard(active) {
  var target = (window.parent !== window) ? window.parent : window;
  if (active) {
    target.onbeforeunload = function(e) {
      e.preventDefault();
      e.returnValue = '';
    };
  } else {
    target.onbeforeunload = null;
  }
}

function doCloseModal() {
  document.getElementById('bd').classList.remove('on');
  setBeforeUnloadGuard(false);
  stopTimer();
  stopStream();
  if (window.parent && window.parent !== window) {
    window.parent.closeModalFrame();
  }
}

const CL_NOTES_KEY = 'wcCLNotes';
function loadNotes() {
  try { return JSON.parse(localStorage.getItem(CL_NOTES_KEY) || '[]'); } catch (e) { return []; }
}
function saveNotes(list) {
  localStorage.setItem(CL_NOTES_KEY, JSON.stringify(list));
}
function nowStr() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}
function upsertNoteRecord(status) {
  const notes = loadNotes();
  const id = currentDraftId || ('note_' + Date.now());
  currentDraftId = id;
  const now = nowStr();
  const idx = notes.findIndex(n => n.id === id);
  const rec = {
    id,
    name: selectedCustomer.name,
    phone: (selectedCustomer.phone && selectedCustomer.phone !== '-') ? selectedCustomer.phone : '',
    birth: (selectedCustomer.birth && selectedCustomer.birth !== '-') ? selectedCustomer.birth : '',
    gender: (selectedCustomer.gender && selectedCustomer.gender !== '-') ? selectedCustomer.gender : '',
    age: (selectedCustomer.age && selectedCustomer.age !== '-') ? selectedCustomer.age : '',
    isNew: !!selectedCustomer.isNew,
    status,
    message: s3Msg,
    createdAt: idx !== -1 ? notes[idx].createdAt : now,
    updatedAt: now
  };
  if (idx !== -1) notes[idx] = rec; else notes.unshift(rec);
  saveNotes(notes);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

  timerInterval = setInterval(() => {
    timerSec++;
    updateTimerDisplay();
  }, 1000);
}

function startStream() {
  const chat = document.getElementById('pzChat');
  chat.innerHTML = '<span style="color:#50606E;font-size:14.4px;">녹음이 시작되었습니다.</span><br><br>';
  lineIdx = 0; charIdx = 0;
  streamInterval = setInterval(() => {
    const chat = document.getElementById('pzChat');
    if (!chat) { clearInterval(streamInterval); return; }
    if (lineIdx >= DEMO_LINES.length) { clearInterval(streamInterval); return; }
    const line = DEMO_LINES[lineIdx];
    if (charIdx === 0) {
      const span = document.createElement('span');
      span.id = 'sline_' + lineIdx;
      chat.appendChild(span);
    }
    const span = document.getElementById('sline_' + lineIdx);
    if (span) span.textContent = line.slice(0, charIdx + 1);
    charIdx++;
    if (charIdx >= line.length) {
      if (span) span.insertAdjacentHTML('afterend', ' ');
      lineIdx++;
      charIdx = 0;
    }
    chat.scrollTop = chat.scrollHeight;
  }, 120);
}

function stopStream() {
  clearInterval(streamInterval);
  streamInterval = null;
}

function showSummary() {
  stopStream();
  stopTimer();
  const chat = document.getElementById('pzChat');
  const recBar = document.querySelector('.pz-rec-bar');
  if (recBar) recBar.style.display = 'none';
  chat.insertAdjacentHTML('beforeend', `

function renderRxSection(preserveSelection) {
  if (!preserveSelection) {
    selectedRx = null;
    selectedRxIds = [];
    editingDrugsMap = {};
  }
  hideSearchSection();
  const S = document.getElementById('rxSection');
  if (!S) return;

  if (selectedCustomer && selectedCustomer.isNew) {
    S.innerHTML = `
      <label class="s2-label">처방전 선택 <span style="color:#888;font-weight:400;">(최근 6개월 · 복수 선택 가능)</span></label>
      <div class="s2-empty-tip">
        <div style="font-size:15.6px;font-weight:600;color:#666;margin-bottom:6px;">확인되는 처방전이 없습니다</div>
        <div style="font-size:14.4px;color:#AAA;line-height:1.7;">신규로 추가된 고객은 아직 처방 이력이 없습니다.<br>지속적으로 복약 상태를 추적 관리하시려면<br>단골 고객으로 연결해 주세요.</div>
      </div>
    `;
    document.getElementById('btnNext').disabled = false;
    return;
  }

  var recentGroups = {};
  var olderGroups = {};
  var allDates = [...new Set(PRESCRIPTIONS.map(rx => rx.date))].sort((a, b) => b.localeCompare(a));
  var latestDate = allDates[0];
  PRESCRIPTIONS.forEach(rx => {
    if (rx.date === latestDate) {
      if (!recentGroups[rx.date]) recentGroups[rx.date] = [];
      recentGroups[rx.date].push(rx);
    } else {
      if (!olderGroups[rx.date]) olderGroups[rx.date] = [];
      olderGroups[rx.date].push(rx);
    }
  });

  var hasOlder = Object.keys(olderGroups).length > 0;
  S.innerHTML = `
    <label class="s2-label">처방전 선택 <span style="color:#888;font-weight:400;">(최근 6개월 · 복수 선택 가능)</span></label>
    <div id="s2polyAlert"></div>
    <div class="s2-rx-list">${buildRxGroupHTML(recentGroups)}</div>
    ${hasOlder ? `
      <div id="s2olderSection" style="display:none"><div class="s2-rx-list">${buildRxGroupHTML(olderGroups)}</div></div>
      <button class="s2-more-btn" id="s2moreBtn" onclick="toggleOlderRx()">이전 처방전 더보기 ▾</button>
    ` : ''}
  `;

  if (preserveSelection) {
    selectedRxIds.forEach(id => {
      const chk = document.getElementById('rxchk_' + id);
      if (chk) chk.checked = true;
      const card = document.getElementById('rxcard_' + id);
      if (card) card.classList.add('checked');
    });
    updatePolyAlert();
    document.getElementById('btnNext').disabled = selectedRxIds.length === 0;
  } else {
    document.getElementById('btnNext').disabled = true;
  }
}

  var isHidden = sec.style.display === 'none';

  btn.textContent = isHidden ? '이전 처방전 접기 ▴' : '이전 처방전 더보기 ▾';
}

    <button class="btn-next" id="btnNext" disabled onclick="goStep2()">다음</button>
  `;
  if (selectedCustomer) {
    renderRxSection(true);
  }
}

function toggleExpand(id) {
  const expand = document.getElementById('rxexpand_' + id);
  const card = document.getElementById('rxcard_' + id);
  const isOpen = expand.classList.contains('open');
  if (isOpen) {
    expand.classList.remove('open');
    card.classList.remove('checked');
  } else {
    const rx = PRESCRIPTIONS.find(r => r.id === id);
    if (selectedRxIds.includes(id)) {
      expand.innerHTML = renderDrugTableHTML(rx);
    } else {
      toggleCheck(id);
      return;
    }
    expand.classList.add('open');
    card.classList.add('checked');
  }
}

function toggleCheck(id) {
  const idx = selectedRxIds.indexOf(id);
  const isChecking = idx === -1;

  if (isChecking) {
    selectedRxIds.push(id);
    const rx = PRESCRIPTIONS.find(r => r.id === id);
    editingDrugsMap[id] = rx.drugs.map(d => Object.assign({}, d));
  } else {
    selectedRxIds.splice(idx, 1);
    delete editingDrugsMap[id];
    delete reminderSettings[id];
    rmExpandedIds.delete(id);
    document.getElementById('rxexpand_' + id).classList.remove('open');
    document.getElementById('rxcard_' + id).classList.remove('checked');
  }

  document.getElementById('rxchk_' + id).checked = isChecking;
  document.getElementById('btnNext').disabled = selectedRxIds.length === 0;
  selectedRx = selectedRxIds.length > 0
    ? PRESCRIPTIONS.find(r => r.id === selectedRxIds[selectedRxIds.length - 1])
    : null;
  updatePolyAlert();
}

function updatePolyAlert() {
  var cutoff3m = new Date();
  cutoff3m.setMonth(cutoff3m.getMonth() - 3);
  var qualifyingCount = selectedRxIds.reduce(function(sum, id) {
    var rx = PRESCRIPTIONS.find(function(r) { return r.id === id; });
    if (!rx) return sum;
    if (parseRxDate(rx.date) < cutoff3m) return sum;  // 3개월 이내 아님
    if (rx.days < 90) return sum;                      // 3개월 미만 복용
    return sum + (editingDrugsMap[id] || rx.drugs).length;
  }, 0);
  const el = document.getElementById('s2polyAlert');
  if (!el) return;
  el.innerHTML = qualifyingCount >= 10 ? `
    <div class="s2-poly-alert" style="margin-bottom:14px;">
      <div class="s2-poly-alert-icon"><span>!</span></div>
      <span class="s2-poly-alert-txt">다제약물관리사업 대상자 확인이 필요합니다</span>
    </div>` : '';
}

function renderAllDrugTables() {
  selectedRxIds.forEach(id => {
    const rx = PRESCRIPTIONS.find(r => r.id === id);
    const expand = document.getElementById('rxexpand_' + id);
    if (expand) expand.innerHTML = renderDrugTableHTML(rx);
  });
  updatePolyAlert();
}

function getEditingDrugs(rxId) {
  return editingDrugsMap[rxId] || [];
}

    <tr id="drow_${rx.id}_${i}">

      <td style="text-align:center;">${d.freq}</td>

        ? '<span style="background:#FFF3E0;color:#E07800;font-size:13.2px;padding:2px 7px;border-radius:10px;font-weight:600;">대체</span>'

        </button>
        <button class="s2-row-del-btn" onclick="deleteDrug('${rx.id}',${i})" title="삭제">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="s2-rx-box">
      <div class="s2-rx-hd">
        <div class="s2-rx-hd-info">
          <strong>${rx.hospital}</strong>
          <span style="color:#888;font-size:14.4px;margin-left:6px;">${rx.days}일분</span>

        <button class="s2-rx-img-btn" onclick="openRxViewer('${rx.date} ${rx.hospital}')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="2" stroke="#555" stroke-width="1.3"/><circle cx="5.5" cy="6.5" r="1.5" stroke="#555" stroke-width="1.3"/><path d="M1 11l4-3 3 3 2-2 5 4" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          처방전 원본 이미지 보기
        </button>
      </div>
      <table class="s2-drug-table">
        <thead>
          <tr>
            <th>약품명 / 성분</th>
            <th style="text-align:center;">1회 용량</th>
            <th style="text-align:center;">복용 횟수</th>
            <th style="text-align:center;">투약 일수</th>
            <th style="text-align:center;">대체조제</th>

          </tr>
        </thead>
        <tbody id="drugTbody_${rx.id}">${drugRows}</tbody>
      </table>
      <div class="s2-add-drug-row">
        <button class="s2-add-drug-btn" onclick="openAddRow('${rx.id}')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          약품 추가
        </button>
      </div>
      ${hasSub ? `
      <div class="s2-consent-row">
        <div class="s2-consent-left">
          <div class="s2-consent-icon"><span>!</span></div>
          <div>
            <div class="s2-consent-title">대체 조제인가요?</div>
            <div class="s2-consent-sub">환자에게 대체조제 사실을 알려야 합니다.</div>
          </div>
        </div>
        <div class="s2-consent-radios">
          <label class="s2-consent-radio">

  const key = rxId + '_' + i;

  document.querySelectorAll('[id^="editForm_"]').forEach(el => el.remove());
  const d = editingDrugsMap[rxId][i];
  const row = document.getElementById('drow_' + key);
  const formRow = document.createElement('tr');
  formRow.id = 'editForm_' + key;
  formRow.className = 's2-edit-row';

    <div class="s2-edit-form">

      <div class="s2-edit-field f-ing"><label>성분명</label><input id="ef_ing_${key}" value="${d.ingredient}"></div>
      <div class="s2-edit-field f-dosage"><label>1회 용량</label><input id="ef_dosage_${key}" value="${d.dosage}"></div>
      <div class="s2-edit-field f-freq"><label>복용 횟수</label><input id="ef_freq_${key}" value="${d.freq}"></div>
      <div class="s2-edit-field f-days"><label>투약 일수</label><input id="ef_days_${key}" type="number" min="1" value="${d.days}"></div>
      <div class="s2-edit-field"><label>대체조제</label>
        <select id="ef_sub_${key}">
          <option value="0" ${!d.sub?'selected':''}>—</option>
          <option value="1" ${d.sub?'selected':''}>대체</option>
        </select>
      </div>
      <div class="s2-edit-actions">
        <button class="s2-edit-cancel" onclick="document.getElementById('editForm_${key}').remove()">취소</button>

      </div>
    </div>
  </td>`;
  row.after(formRow);
  document.getElementById('ef_name_' + key).focus();
}

function closeEditRow(key) {
  const el = document.getElementById('editForm_' + key);
  if (el) el.remove();
}

function saveEditRow(rxId, i) {
  const key = rxId + '_' + i;
  const prev = editingDrugsMap[rxId][i];
  editingDrugsMap[rxId][i] = {
    name: document.getElementById('ef_name_' + key).value.trim() || prev.name,
    ingredient: document.getElementById('ef_ing_' + key).value.trim() || prev.ingredient,
    dosage: document.getElementById('ef_dosage_' + key).value.trim() || prev.dosage,
    freq: document.getElementById('ef_freq_' + key).value.trim() || prev.freq,
    days: parseInt(document.getElementById('ef_days_' + key).value) || prev.days,
    sub: document.getElementById('ef_sub_' + key).value === '1',
  };
  renderAllDrugTables();
}

function deleteDrug(rxId, i) {
  if (!confirm(`"${editingDrugsMap[rxId][i].name}" 을(를) 목록에서 삭제할까요?`)) return;
  editingDrugsMap[rxId].splice(i, 1);
  renderAllDrugTables();
}

function openAddRow(rxId) {
  const formId = 'addFormRow_' + rxId;
  if (document.getElementById(formId)) return;
  document.querySelectorAll('[id^="editForm_"]').forEach(el => el.remove());
  const addRow = document.createElement('tr');
  addRow.id = formId;
  addRow.className = 's2-add-form-row';
  addRow.innerHTML = `<td colspan="6" style="padding:12px 14px;background:#F8FBFF;">
    <div style="font-size:13.8px;font-weight:700;color:#2563EB;margin-bottom:8px;">약품 추가</div>
    <div class="s2-edit-form">
      <div class="s2-edit-field f-name"><label>약품명</label><input id="af_name_${rxId}" placeholder="약품명 입력"></div>
      <div class="s2-edit-field f-ing"><label>성분명</label><input id="af_ing_${rxId}" placeholder="성분명"></div>
      <div class="s2-edit-field f-dosage"><label>1회 용량</label><input id="af_dosage_${rxId}" placeholder="예: 1정"></div>

function saveAddRow(rxId) {
  const name = document.getElementById('af_name_' + rxId).value.trim();
  const ingredient = document.getElementById('af_ing_' + rxId).value.trim();
  const dosage = document.getElementById('af_dosage_' + rxId).value.trim();
  const freq = document.getElementById('af_freq_' + rxId).value.trim();
  const days = parseInt(document.getElementById('af_days_' + rxId).value) || 0;
  if (!name || !dosage || !freq || !days) {
    alert('약품명, 용량, 복용 횟수, 투약 일수를 모두 입력해 주세요.'); return;
  }
  editingDrugsMap[rxId].push({ name, ingredient: ingredient || '—', dosage, freq, days, sub: document.getElementById('af_sub_' + rxId).value === '1' });
  renderAllDrugTables();
}

function openRxViewer(title) {
  document.getElementById('rxViewerTitle').textContent = title + ' 처방전';
  document.getElementById('rxViewerBd').classList.add('on');
}

function closeRxViewer() {
  document.getElementById('rxViewerBd').classList.remove('on');
}

const S3_TAGS = ['공복에 복용하세요.','충분한 물과 함께 드세요.','잠이 올 수 있으니 주의하세요.','술을 드시지 마세요.','임의로 복용을 중단하지 마세요.'];
let s3SelTags = new Set();
let s3Msg = '';
let reminderSettings = {};
let rmExpandedIds = new Set();

function buildMsgDefault() {
  const c = selectedCustomer;
  if (!selectedRxIds.length) {
    return '[복약 상담 안내]\n안녕하세요, 웰체크약국입니다.\n' + c.name + ' 고객님, 지속적인 복약 관리를 위해 안내드립니다.\n';
  }
  let drugLines = [];
  let allSlots = [];
  let allTiming = '';
  let hasReminder = false;
  let idx = 1;
  selectedRxIds.forEach(function(id) {
    var drugs = editingDrugsMap[id] || [];
    drugs.forEach(function(d) {
      drugLines.push(idx++ + '. ' + d.name + ' - 1회 ' + d.dosage + ', ' + d.freq + ', ' + d.days + '일분');
    });
    var rs = (typeof reminderSettings !== 'undefined') ? reminderSettings[id] : null;
    if (rs && rs.enabled) {
      hasReminder = true;
      if (rs.slots) rs.slots.forEach(function(s) { if (!allSlots.includes(s)) allSlots.push(s); });
      if (rs.timing && !allTiming) allTiming = rs.timing;
    }
  });
  var freqSlotMap = { '1일 1회': ['아침'], '1일 2회': ['아침', '저녁'], '1일 3회': ['아침', '점심', '저녁'], '1일 4회': ['아침', '점심', '저녁', '취침 전'] };
  var ocrSlots = [];
  selectedRxIds.forEach(function(id) {
    (editingDrugsMap[id] || []).forEach(function(d) {
      var mapped = freqSlotMap[d.freq] || [];
      mapped.forEach(function(s) { if (!ocrSlots.includes(s)) ocrSlots.push(s); });
    });
  });
  var methodSection;
  if (hasReminder) {
    var scheduleTime = allSlots.length
      ? allSlots.join(' · ') + ' ' + (allTiming || '식후 30분')
      : (ocrSlots.length ? ocrSlots.join(' · ') + ' 식후 30분' : '약사님이 등록한 시간');
    methodSection = '담당 약사가 고객님의 처방전을 직접 살펴보고\n빠짐없이 약을 드실 수 있도록 맞춤 복약 알림을 등록했어요.\n\n⏰ ' + scheduleTime + '\n웰체크 앱에서 알림이 울리면 복약하세요.';
  } else {
    var scheduleTime2 = ocrSlots.length ? ocrSlots.join(' · ') + ' 식후 30분' : '';
    methodSection = scheduleTime2 ? '⏰ ' + scheduleTime2 + '\n복약하세요.' : '';
  }
  var methodBlock = methodSection ? '\n\n[복약 방법]\n' + methodSection : '';
  return '[복약 상담 안내]\n안녕하세요, 웰체크약국입니다.\n' + c.name + ' 고객님, 처방받으신 약품을 안내드립니다.\n\n[조제 약품]\n' + drugLines.join('\n') + methodBlock + '\n';
}

function stripJoinNote(text) {
  var idx = text.indexOf('\n\n[웰체크 앱 가입 안내]');

    ? reminderCount + '건 설정 (웰체크 앱 자동 등록)'
    : '<span style="color:#AAA;">설정 안 함</span>') + '</td></tr>';

  B.innerHTML = '<div class="prev-grid">'

    + '<div class="prev-msg">' + previewMsg.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div></div>'

    + '<tr><td>생년월일</td><td>' + (c.birth || '—') + '</td></tr>'

    + phoneRow
    + regularRow
    + reminderRow
    + '</table>'
    + (isNew ? '<p style="font-size:13.2px;color:#2563EB;margin-top:10px;line-height:1.6;">신규 고객입니다. 휴대폰 번호로 웰체크 앱 가입 및<br>단골 약국 연결 링크가 함께 발송됩니다.</p>' : '')
    + '</div></div>';

  F.innerHTML = '<span class="rm-step-lbl">Step 4 / 4 · 전송 확인</span>'
    + '<button class="btn-cancel" onclick="renderMsgBody();setStepTab(3);currentStep=3;">← 이전</button>'
    + '<button class="btn-cancel" onclick="saveDraft()" style="color:#2563EB;border-color:#A0B4FF;">임시저장</button>'
    + '<button class="btn-next" onclick="sendFinal()">➤ 전송하기</button>';
}

function sendFinal() {
  var isNew = selectedCustomer.isNew || (!selectedCustomer.phone || selectedCustomer.phone === '-');
  if (isNew) {
    var ph = (document.getElementById('s4phone') || {}).value || '';
    if (!ph.trim()) { alert('휴대폰 번호를 입력해 주세요.'); return; }
    selectedCustomer.phone = ph.trim();
  }
  upsertNoteRecord('발송완료');
  var name = selectedCustomer.name;
  var B = document.getElementById('mbody');
  var F = document.getElementById('mfoot');
  document.querySelector('.step-tabs').style.visibility = 'hidden';
  document.getElementById('modalPt').classList.remove('on');
  B.innerHTML = `<div class="cpl-wrap">
    <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">

      <circle cx="38" cy="44" r="3" fill="#DDE1E7"/>

    <div class="cpl-ttl">AI 복약 상담 전송 완료</div>
    <div class="cpl-sub">${name} 님께 복약 안내 메시지가 발송되었습니다.</div>
  </div>`;
  F.innerHTML = `<button class="btn-close-cpl" onclick="doCloseModal()">닫기</button>`;
}

function insertSummaryIntoMsg(text, summary) {
  var marker = '[약사 상담 메모]\n';
  var idx = text.indexOf(marker);
  if (idx !== -1) return text.slice(0, idx + marker.length) + summary;
  return text + '\n\n[약사 상담 메모]\n' + summary;
}

function s3ToggleTag(i, t) {
  var ta = document.getElementById('s3mta');
  if (s3SelTags.has(i)) {
    s3SelTags.delete(i);
    if (ta) ta.value = ta.value.replace('\n' + t, '').replace(t + '\n', '').replace(t, '');
  } else {
    s3SelTags.add(i);
    if (ta) ta.value += (ta.value.endsWith('\n') ? '' : '\n') + t;
  }
  if (ta) { s3Msg = ta.value; document.getElementById('s3mcnt').textContent = ta.value.length + ' / 500자'; }
  document.querySelectorAll('.tag-chip').forEach(function(el, idx) { el.classList.toggle('on', s3SelTags.has(idx)); });
}

function s3OnMsg(el) {
  s3Msg = el.value;
  document.getElementById('s3mcnt').textContent = el.value.length + ' / 500자';
}

function s3ResetMsg() {
  s3SelTags = new Set();
  s3Msg = buildMsgDefault();
  if (aiSummaryText) s3Msg = insertSummaryIntoMsg(s3Msg, aiSummaryText);
  s3Msg = appendJoinNoteIfNew(s3Msg);
  renderMsgBody();
}

function insertAiSummary() {
  var ta = document.getElementById('s3mta');
  if (!ta || !aiSummaryText) return;
  ta.value = appendJoinNoteIfNew(insertSummaryIntoMsg(stripJoinNote(ta.value), aiSummaryText));
  s3Msg = ta.value;
  document.getElementById('s3mcnt').textContent = ta.value.length + ' / 500자';
  showToast('AI 요약이 삽입되었습니다.');
}

function saveDraft() {
  var ta = document.getElementById('s3mta');
  if (ta) s3Msg = ta.value;
  upsertNoteRecord('임시저장');
  showToast('복약지도가 임시저장되었습니다.');
}

async function startIfMicOk() {
  let state = 'prompt';
  try {
    const r = await navigator.permissions.query({ name: 'microphone' });
    state = r.state;
    // 권한 변경 시 자동으로 모달 닫고 스트림 시작
    r.addEventListener('change', () => {
      if (r.state === 'granted') {
        document.getElementById('micPermLayer').classList.remove('on');
        const recBar = document.querySelector('.pz-rec-bar');
        if (recBar) recBar.style.display = '';
        startTimer();
        startStream();
      }
    });
  } catch (e) { /* permissions API 미지원 */ }

  if (state === 'granted') {
    const recBar = document.querySelector('.pz-rec-bar');
    if (recBar) recBar.style.display = '';
    startTimer();
    startStream();
  } else {
    // prompt 또는 denied — 모달 표시
    document.getElementById('micPermLayer').classList.add('on');
    document.getElementById('micPermBtn').disabled = false;
    document.getElementById('micPermBtn').textContent = '설정하기';
    document.getElementById('micPermHint').style.display = state === 'denied' ? '' : 'none';
  }
}

async function requestMicAccess() {
  const btn = document.getElementById('micPermBtn');
  btn.textContent = '요청 중...';
  btn.disabled = true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop());
    document.getElementById('micPermLayer').classList.remove('on');
    const recBar = document.querySelector('.pz-rec-bar');
    if (recBar) recBar.style.display = '';
    startTimer();
    startStream();
  } catch (e) {
    // denied 또는 사용자가 거부
    btn.textContent = '설정하기';
    btn.disabled = false;
    document.getElementById('micPermHint').style.display = '';
  }
}
</script>
